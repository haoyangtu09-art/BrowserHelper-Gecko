name: Build Gecko Browser Helper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: List APK outputs
        run: find app/build/outputs/apk/debug -type f -name '*.apk' -print -exec ls -lh {} \;

      - name: Rename arm64 APK
        run: |
          mkdir -p artifacts
          SHORT_SHA="${GITHUB_SHA::8}"
          cp app/build/outputs/apk/debug/*arm64-v8a*.apk "artifacts/BrowserHelper-Gecko-${SHORT_SHA}-arm64.apk"
          ls -lh artifacts

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: browser-helper-gecko-arm64-apk
          path: artifacts/*.apk
          if-no-files-found: error
