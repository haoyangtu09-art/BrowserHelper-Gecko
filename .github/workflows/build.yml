name: Build Gecko Browser Helper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: List APK outputs
        run: find app/build/outputs/apk/debug -type f -name '*.apk' -print -exec ls -lh {} \;

      - name: Rename arm64 APK
        run: |
          mkdir -p artifacts
          SHORT_SHA="${GITHUB_SHA::8}"
          cp app/build/outputs/apk/debug/*arm64-v8a*.apk "artifacts/BrowserHelper-Gecko-${SHORT_SHA}-arm64.apk"
          ls -lh artifacts

      - name: Publish helper release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="browser-helper-debug-latest"
          APK="$(find artifacts -type f -name '*.apk' | head -n 1)"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "浏览器插件 Debug APK" --notes "Latest debug APK built by GitHub Actions." --prerelease
          gh release upload "$TAG" "$APK#browser-helper.apk" --clobber

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: browser-helper-gecko-arm64-apk
          path: artifacts/*.apk
          retention-days: 1
          if-no-files-found: error
